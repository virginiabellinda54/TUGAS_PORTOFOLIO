<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin - Portofolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo"><i class="fas fa-user-shield"></i></div>
      <h1>Admin Login</h1>
      <p class="login-sub">Masuk untuk mengelola konten portofolio</p>

      <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="admin" required autofocus />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="admin123" required />

        <div id="loginError" class="login-error" style="display:none;"></div>

        <button type="submit" class="btn-login" id="loginBtn">Masuk</button>
      </form>

      <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Portofolio</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
